<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD ABDUR RAHIM | IT Support Specialist</title>

    <style>
        :root {
            --bg: #ffffff;
            --text: #0d1117;
            --card: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.8);
            --hero-gradient: linear-gradient(135deg, #4f46e5, #3b82f6);
        }

        body.dark {
            --bg: #0d1117;
            --text: #ffffff;
            --card: #161b22;
            --nav-bg: rgba(22, 27, 34, 0.8);
            --hero-gradient: linear-gradient(135deg, #1e1b4b, #1e3a8a);
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: 0.3s ease;
        }

        a { color: var(--text); text-decoration: none; }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            z-index: 1000;
        }

        nav a {
            margin: 0 12px;
            font-weight: bold;
            font-size: 14px;
        }

        .theme-toggle {
            padding: 8px 16px;
            border: none;
            background: var(--card);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* HERO SECTION — COMPACT VERSION */
        .hero {
            min-height: 55vh; /* Ensures your name is visible immediately */
            background: var(--hero-gradient);
            padding: 100px 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .hero-inner {
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 30px;
            align-items: center;
        }

        .hero img {
            width: 160px;
            height: 160px;
            border-radius: 16px;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.9);
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        .hero-text h1 {
            font-size: 30px;
            margin: 0 0 6px;
        }

        .hero-text h2 {
            font-size: 16px;
            margin: 0 0 12px;
            font-weight: normal;
            opacity: 0.9;
        }

        .hero-text p {
            font-size: 14px;
            line-height: 1.6;
            max-width: 420px;
        }

        /* Sections */
        section {
            max-width: 1000px;
            margin: 60px auto;
            padding: 40px;
            background: var(--card);
            border-radius: 10px;
        }

        h2 {
            border-left: 5px solid var(--text);
            padding-left: 10px;
            margin-bottom: 20px;
        }

        /* Cards */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            padding: 18px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: 0.25s;
            font-size: 15px;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.12);
        }

        footer {
            text-align: center;
            padding: 20px;
            background: var(--nav-bg);
            margin-top: 40px;
            font-size: 14px;
        }

        @media (max-width: 800px) {
            .hero {
                padding: 100px 20px 40px;
            }
            .hero-inner {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .hero-text p {
                margin: 0 auto;
            }
        }
    </style>
</head>

<body>

<!-- Navigation -->
