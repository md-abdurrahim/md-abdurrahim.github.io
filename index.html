<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MD ABDUR RAHIM | IT Support Specialist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    :root {
      --bg: #050816;
      --text: #e5e7eb;
      --accent: #22c55e;
      --card: #0f172a;
      --border: rgba(148, 163, 184, 0.3);
    }

    body {
      background: radial-gradient(circle at top, #1f2937 0, #020617 45%, #000 100%);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: rgba(15, 23, 42, 0.96);
      border-right: 1px solid var(--border);
      padding: 28px 22px;
      position: fixed;
      inset: 0 auto 0 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      backdrop-filter: blur(18px);
    }

    /* MOVING NAME */
    .moving-name {
      overflow: hidden;
      white-space: nowrap;
      width: 100%;
      font-size: 16px;
      font-weight: 600;
      margin-top: 10px;
      color: var(--accent);
    }

    .moving-name span {
      display: inline-block;
      padding-left: 100%;
      animation: moveName 10s linear infinite;
    }

    @keyframes moveName {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
